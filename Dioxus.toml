[application]
name = "telcoin-explorer"
default_platform = "web"

[web.app]
title = "TelScan — Telcoin Network Explorer"
base_path = "/"

[web.watcher]
reload_html = true
watch_path = ["src", "assets"]

[web.resource]
style = ["/assets/main.css"]
index_on_404 = true
# Inline style injected before anything else - prevents white flash
head = ["<style>html,body{background:#0B1628;}</style>"]

[web.resource.dev]
style = ["/assets/main.css"]
head = ["<style>html,body{background:#0B1628;}</style>"]
