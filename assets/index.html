<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TelScan — Telcoin Network Explorer</title>
  <meta name="description" content="Block explorer for the Telcoin Network (Adiri Testnet)" />
  <style>
    /* Critical inline CSS — prevents white flash before WASM loads */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #0B1628;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0B1628;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loader-logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #2DCEFF, #0a8fa8);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 30px rgba(45,206,255,0.3);
      animation: logopulse 1.8s ease-in-out infinite;
    }
    @keyframes logopulse {
      0%, 100% { box-shadow: 0 0 20px rgba(45,206,255,0.2); }
      50%       { box-shadow: 0 0 40px rgba(45,206,255,0.5); }
    }
    .loader-name {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .loader-sub {
      font-size: 12px;
      color: rgba(45,206,255,0.7);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .loader-bar-wrap {
      width: 160px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .loader-bar {
      height: 100%;
      background: linear-gradient(90deg, #2DCEFF, #5AE0FF);
      border-radius: 2px;
      animation: loadbar 1.4s ease-in-out infinite;
    }
    @keyframes loadbar {
      0%   { width: 0%;   margin-left: 0%; }
      50%  { width: 60%;  margin-left: 20%; }
      100% { width: 0%;   margin-left: 100%; }
    }
  </style>
  <dioxus-head />
</head>
<body>
  <!-- Loading screen shown before WASM is ready -->
  <div id="loading-screen">
    <div class="loader-logo">⬡</div>
    <div class="loader-name">TelScan</div>
    <div class="loader-sub">Adiri Testnet</div>
    <div class="loader-bar-wrap">
      <div class="loader-bar"></div>
    </div>
  </div>

  <dioxus-router />

  <script>
    // Fade out the loading screen once Dioxus has mounted
    const observer = new MutationObserver(() => {
      const app = document.getElementById('main');
      if (app && app.children.length > 0) {
        const screen = document.getElementById('loading-screen');
        if (screen) {
          screen.classList.add('fade-out');
          setTimeout(() => screen.remove(), 350);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
